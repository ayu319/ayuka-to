let audioCtx = null;
let bgmInterval = null;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

window.addEventListener('click', () => { initAudio(); });
window.addEventListener('keydown', () => { initAudio(); });

function playTone(freq, duration, type='sine', volume=0.1) {
    if (!audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function soundCount() { playTone(440, 0.1, 'sine', 0.15); }
function soundGo() { playTone(880, 0.4, 'sine', 0.2); startBGM(); }

// 📐 コースの進捗を正確にマッピングするためのノードデータ

];
const NODE_COUNT = npcPathNodes.length;

let totalTrackLength = 0;
let segmentLengths = [];

function initTrackLengths() {
    totalTrackLength = 0;
    segmentLengths = [];
    for (let i = 0; i < NODE_COUNT; i++) {
        let p1 = npcPathNodes[i];
        let p2 = npcPathNodes[(i + 1) % NODE_COUNT];
        let dx = p2.x - p1.x;
        let dz = p2.z - p1.z;
        let len = Math.sqrt(dx*dx + dz*dz);
        segmentLengths.push(len);
        totalTrackLength += len;
    }
}
initTrackLengths();

// プレイヤーのコース上の正確な進捗率(0.0〜1.0)を算出する計算エンジン
function calculatePlayerProgress() {
    let bestDist = Infinity;
    let bestProgress = 0;
    let accumulatedLength = 0;
    const px = carGroup.position.x;
    const pz = carGroup.position.z;
    
    for (let i = 0; i < NODE_COUNT; i++) {
        let p1 = npcPathNodes[i];
        let p2 = npcPathNodes[(i + 1) % NODE_COUNT];
        let len = segmentLengths[i];
        
        let t = 0;
        if (len > 0) {
            t = ((px - p1.x) * (p2.x - p1.x) + (pz - p1.z) * (p2.z - p1.z)) / (len * len);
            t = Math.max(0, Math.min(1, t)); // 線分上にクランプ
        }
        let projX = p1.x + t * (p2.x - p1.x);
        let projZ = p1.z + t * (p2.z - p1.z);
        let dist = Math.sqrt((px - projX)**2 + (pz - projZ)**2);
        
        if (dist < bestDist) {
            bestDist = dist;
            bestProgress = (accumulatedLength + t * len) / totalTrackLength;
        }
        accumulatedLength += len;
    }
    return bestProgress;
}

// 👑 常時、正確な順位（1〜12位）を算出する関数
function getPlayerRank() {
    if (raceState !== 2) return 1;
    let myRank = 1;
    playerProgress = (itemBulletTimer > 0) ? bulletProgress : calculatePlayerProgress();
    let playerProgressVal = playerLap + playerProgress;
    
    npcs.forEach(npc => {
        let npcProgressVal = npc.lap + npc.progress;
        if (npcProgressVal > playerProgressVal) {
            myRank++;
        }
    });
    return myRank;
}

        // 下位 (8位〜12位) [🚀キラー高確率出現]
        pool = ["金キノコ",　"金キノコ",　"金キノコ", "スター", "サンダー", "テレサ"];
    }
    return pool[Math.floor(Math.random() * pool.length)];
}

// 絵文字のスプライトを作成する共通関数
function createEmojiSprite(emoji) {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.font = '90px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(emoji, 64, 64);
    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(material); sprite.scale.set(7, 7, 1);
    return sprite;
}

function spawnDroppedItem(itemType, basePosition) {
    if (!itemType) return;
    const sprite = createEmojiSprite(getEmojiForItem(itemType));
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.random() * 9 + 4;
    sprite.position.set(basePosition.x + Math.cos(angle) * radius, 2.0, basePosition.z + Math.sin(angle) * radius);
    scene.add(sprite);
    droppedItems.push({ mesh: sprite, type: itemType, timer: 600 });
}

function dropPlayerItems() {
    isItemRoulette = false; rouletteSlot = -1; 
    if (isItemShielding && shieldShellMesh) {
        carGroup.remove(shieldShellMesh); shieldShellMesh = null; isItemShielding = false;
        if (heldItems[0]) spawnDroppedItem(heldItems[0], carGroup.position); heldItems[0] = null;
    } else {
        if (heldItems[0]) { spawnDroppedItem(heldItems[0], carGroup.position); heldItems[0] = null; }
    }
    if (heldItems[1]) { spawnDroppedItem(heldItems[1], carGroup.position); heldItems[1] = null; }
    updateItemUI();
}

function dropCoins() {

}

    } else if (item === "緑甲羅") {
        const sm = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshStandardMaterial({ color: 0x33cc33 }));
        sm.position.copy(npc.mesh.position).y += 0.5;
        const dir = new THREE.Vector3(-Math.sin(npc.mesh.rotation.y), 0, -Math.cos(npc.mesh.rotation.y)).normalize();
        sm.position.addScaledVector(dir, 4.0); scene.add(sm); shells.push({ mesh: sm, dir: dir, type: "green", life: 250 });
    } else if (item === "赤甲羅") {
        const sm = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff3333 }));
        sm.position.copy(npc.mesh.position).y += 0.5; scene.add(sm); 
        if (Math.random() < 0.4) {
            shells.push({ mesh: sm, type: "red_to_player", life: 350 }); 
        } else {
            let target = npcs[Math.floor(Math.random() * npcs.length)];
            shells.push({ mesh: sm, type: "red", targetNpc: target, life: 400 });
        }
    } else if (item === "サンダー") {
        if (itemMegaTimer <= 0 && itemStarTimer <= 0 && itemBooTimer <= 0 && itemBulletTimer <= 0 && playerHitInvincibleTimer <= 0) { 
            isSquishedTimer = 120; speed = 0; itemMushroomTimer = 0; itemGoldenTimer = 0; soundHit();

        }
        npcs.forEach(other => { if (other !== npc && other.isMega <= 0 && other.isStar <= 0) { dropNpcItems(other); other.isSquished = 120; other.boostTimer = 0; } });

}

const carPos = carGroup.position;

function animate() {
    requestAnimationFrame(animate);
    const turboText = document.getElementById("turbo-ui");
    const statusText = document.getElementById("status-text");
    const rankText = document.getElementById("rank-text");
    const lapText = document.getElementById("lap-text");
    const countdownEl = document.getElementById("countdown");

    gearGroup.rotation.z += 0.008; alertLight.intensity = Math.sin(Date.now() * 0.01) * 0.8 + 0.8;

    if (playerHitInvincibleTimer > 0) playerHitInvincibleTimer--;

    let camOffsetX = isDrifting ? -driftDir * 5.0 : 0;
    let relativeCameraOffset = keys.s ? new THREE.Vector3(camOffsetX, 6.0, -15) : new THREE.Vector3(camOffsetX, 6.0, 15);
    const targetCameraOffset = relativeCameraOffset.applyMatrix4(carGroup.matrixWorld);
    currentCameraPos.lerp(targetCameraOffset, 0.08); camera.position.copy(currentCameraPos);
    camera.lookAt(new THREE.Vector3(carPos.x, carPos.y + 1.2, carPos.z));

    let inEntryZone = (carPos.x > -entryZoneGeo.parameters.width/2 && carPos.x < entryZoneGeo.parameters.width/2 && carPos.z > 80 && carPos.z < 140);

    if (raceState === 0) {
        rankText.innerText = "順位: 自由走行中"; lapText.innerText = "Lap: --";
        let targetText = inEntryZone ? "【E】キーで20周耐久レース開始！" : "黄色のエリアへ向かおう";
        if (targetText !== lastCenterText) { countdownEl.innerText = targetText; lastCenterText = targetText; centerUiTimer = 5000; }
        if (centerUiTimer > 0) { centerUiTimer -= 16.66; if (centerUiTimer <= 0) countdownEl.innerText = ""; }
        if (inEntryZone && keys.e) { keys.e = false; startRaceGridPlacement(); raceState = 1; countdownTime = 4000; rocketTimer = 0; rocketFailed = false; lastCenterText = ""; }
    } else if (raceState === 1) {
        countdownTime -= 16.66; let seconds = countdownTime / 1000; let secInt = Math.floor(seconds);
        if (seconds > 3) { countdownEl.innerText = "3"; if(lastSecondsInt !== 3){ soundCount(); lastSecondsInt = 3; } }
        else if (seconds > 2) { countdownEl.innerText = "2"; if(lastSecondsInt !== 2){ soundCount(); lastSecondsInt = 2; } if (keys.w) rocketTimer += 16.66; }
        else if (seconds > 1) { countdownEl.innerText = "1"; if(lastSecondsInt !== 1){ soundCount(); lastSecondsInt = 1; } if (keys.w && rocketTimer > 400) rocketFailed = true; }
        else if (seconds > 0) {
            countdownEl.innerText = "GO!!"; raceState = 2; soundGo();
            if (rocketTimer > 300 && rocketTimer < 950 && !rocketFailed) { turboTimer = 30; soundBoost(); turboText.innerText = "🚀 ロケットスタート！ 🚀"; }
            else if (rocketFailed) { speed = -0.2; turboTimer = -20; soundHit(); turboText.innerText = "💨 エンスト！ 💨"; }
        }
    } else if (raceState === 2) {
        if (countdownTime > -1000) { countdownTime -= 16.66; if (countdownTime <= 0) countdownEl.innerText = ""; }
    } else if (raceState === 3) {
        if (lastCenterText !== "FINISH!!") { countdownEl.innerText = "FINISH!! (耐久完走！)"; lastCenterText = "FINISH!!"; centerUiTimer = 5000; }
        if (centerUiTimer > 0) { centerUiTimer -= 16.66; if (centerUiTimer <= 0) countdownEl.innerText = ""; }
    }

    // 甲羅処理
    for (let i = shells.length - 1; i >= 0; i--) {
        const shell = shells[i]; const sSpeed = 3.5; shell.life--;
        if (shell.type === "green") {
            shell.mesh.position.addScaledVector(shell.dir, sSpeed); shell.mesh.rotation.y += 0.1;
        } else if (shell.type === "red" && shell.targetNpc) {
            const tPos = shell.targetNpc.mesh.position;
            const sDir = new THREE.Vector3().subVectors(tPos, shell.mesh.position); sDir.y = 0; sDir.normalize();
            shell.mesh.position.addScaledVector(sDir, sSpeed); shell.mesh.lookAt(tPos.x, shell.mesh.position.y, tPos.z);
        } else if (shell.type === "red_to_player") {
            const tPos = carGroup.position;
            const sDir = new THREE.Vector3().subVectors(tPos, shell.mesh.position); sDir.y = 0; sDir.normalize();
            shell.mesh.position.addScaledVector(sDir, sSpeed); shell.mesh.lookAt(tPos.x, shell.mesh.position.y, tPos.z);
            if (shell.mesh.position.distanceTo(carGroup.position) < 5.5) {
                if (isItemShielding) {
                    isItemShielding = false; if (shieldShellMesh) { carGroup.remove(shieldShellMesh); shieldShellMesh = null; }
                    heldItems[0] = heldItems[1]; heldItems[1] = null; updateItemUI(); soundHit();
                    turboText.innerText = "🛡️ ガード成功！後ろの甲羅で防いだ！ 🛡️"; turboText.style.color = "#00ff00";
                } else if (itemMegaTimer <= 0 && itemStarTimer <= 0 && itemBooTimer <= 0 && itemBulletTimer <= 0) { 
                    if (playerHitInvincibleTimer > 0) {
                        turboText.innerText = "🛡️ 被弾無敵バリアにより甲羅を弾き飛ばした！ 🛡️"; turboText.style.color = "#33ffff";
                    } else {
                        isSquishedTimer = 90; speed = 0; turboTimer = 0; itemMushroomTimer = 0; itemGoldenTimer = 0; 
                        playerHitInvincibleTimer = 180; 
                        soundHit(); 
                        dropCoins(); // ❌ サンダー以外アイテムは落とさない
                        turboText.innerText = "💥 被弾！赤甲羅を喰らった！！ 💥"; turboText.style.color = "#ff3333";
                    }
                } else { turboText.innerText = "🛡️ 無敵状態で甲羅を粉砕！ 🛡️"; turboText.style.color = "#ffff00"; }
                shell.life = 0;
            }
        }
        let hasHit = false;
        if (shell.type !== "red_to_player") {
            for (let j = 0; j < npcs.length; j++) {
                const npc = npcs[j];
                if (shell.mesh.position.distanceTo(npc.mesh.position) < 5.5) { 
                    if (npc.isMega <= 0 && npc.isStar <= 0) { npc.isSquished = 120; npc.boostTimer = 0; }
                    hasHit = true; soundHit(); turboText.innerText = `🎯 甲羅がライバルに命中！ 🎯`; turboText.style.color = "#00ff00"; break; 
                }
            }
        }
        if (hasHit || shell.life <= 0 || shell.mesh.position.length() > 5000) { scene.remove(shell.mesh); shells.splice(i, 1); }
    }

    // ドロップアイテム回収
    for (let i = droppedItems.length - 1; i >= 0; i--) {
        const dItem = droppedItems[i]; dItem.timer--; dItem.mesh.position.y = 2.0 + Math.sin(Date.now() * 0.007) * 0.4; 
        const distXZ = Math.sqrt(Math.pow(carGroup.position.x - dItem.mesh.position.x, 2) + Math.pow(carGroup.position.z - dItem.mesh.position.z, 2));

        if (distXZ < 4.5) {
            if (dItem.type === "コイン") {
                if (coins < 10) coins++;
                playTone(587.33, 0.08, 'sine', 0.1);
                document.getElementById("coin-text").innerText = `🪙 コイン: ${coins}/10`;
                scene.remove(dItem.mesh); droppedItems.splice(i, 1); continue;
            }
            if (!isItemRoulette) {
                soundItem();
                if (!heldItems[0]) { heldItems[0] = dItem.type; updateItemUI(); scene.remove(dItem.mesh); droppedItems.splice(i, 1); continue; } 
                else if (!heldItems[1]) { heldItems[1] = dItem.type; updateItemUI(); scene.remove(dItem.mesh); droppedItems.splice(i, 1); continue; }
            }
        }

        let startNode = npcPathNodes[segment % NODE_COUNT]; let endNode = npcPathNodes[(segment + 1) % NODE_COUNT];
        npc.mesh.position.set(startNode.x + (endNode.x - startNode.x) * segmentPercent, 0, startNode.z + (endNode.z - startNode.z) * segmentPercent + ((index%2===0)?5:-5));
        if(npc.isMega > 0) { npc.isMega--; npc.mesh.scale.set(2.3, 2.3, 2.3); }
        npc.mesh.lookAt(endNode.x, 0, endNode.z);
    });

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
animate();
</script>
</body>
