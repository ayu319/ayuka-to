let audioCtx = null;
let bgmInterval = null;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

window.addEventListener('click', () => { initAudio(); });
window.addEventListener('keydown', () => { initAudio(); });

function playTone(freq, duration, type='sine', volume=0.1) {
    if (!audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function soundCount() { playTone(440, 0.1, 'sine', 0.15); }
function soundGo() { playTone(880, 0.4, 'sine', 0.2); startBGM(); }
function soundItem() {
    playTone(523.25, 0.05, 'sine', 0.15);
    setTimeout(() => playTone(659.25, 0.05, 'sine', 0.15), 50);
    setTimeout(() => playTone(783.99, 0.15, 'sine', 0.15), 100);
}
function soundBoost() {
    playTone(330, 0.04, 'sawtooth', 0.08);
    setTimeout(() => playTone(440, 0.04, 'sawtooth', 0.08), 40);
    setTimeout(() => playTone(554.37, 0.04, 'sawtooth', 0.08), 80);
    setTimeout(() => playTone(659.25, 0.12, 'sawtooth', 0.08), 120);
}
function soundHit() {
    playTone(120, 0.25, 'sawtooth', 0.25);
    playTone(90, 0.3, 'triangle', 0.3);
}

function startBGM() {
    if (bgmInterval) clearInterval(bgmInterval);
    let step = 0;
    const bassNodes = [110, 110, 130, 110, 146, 146, 165, 130]; 
    bgmInterval = setInterval(() => {
        if (raceState !== 2) { if(raceState === 3) clearInterval(bgmInterval); return; }
        let f = bassNodes[step % bassNodes.length];
        playTone(f, 0.13, 'triangle', 0.18);
        if (step % 2 === 0) {
            let mel = [440, 493.88, 523.25, 587.33, 659.25, 587.33, 523.25, 493.88];
            playTone(mel[(step / 2) % mel.length], 0.07, 'square', 0.02);
        }
        step++;
    }, 160);
}

];
const NODE_COUNT = npcPathNodes.length;

let totalTrackLength = 0;
let segmentLengths = [];

function initTrackLengths() {
    totalTrackLength = 0;
    segmentLengths = [];
    for (let i = 0; i < NODE_COUNT; i++) {
        let p1 = npcPathNodes[i];
        let p2 = npcPathNodes[(i + 1) % NODE_COUNT];
        let dx = p2.x - p1.x;
        let dz = p2.z - p1.z;
        let len = Math.sqrt(dx*dx + dz*dz);
        segmentLengths.push(len);
        totalTrackLength += len;
    }
}
initTrackLengths();

let lastPlayerSegment = 0;

function calculatePlayerProgress() {
    let bestDist = Infinity;
    let bestProgress = 0;
    let bestSegment = lastPlayerSegment;
    const px = carGroup.position.x;
    const pz = carGroup.position.z;

    const WINDOW = 7;
    for (let offset = -WINDOW; offset <= WINDOW; offset++) {
        let i = ((lastPlayerSegment + offset) % NODE_COUNT + NODE_COUNT) % NODE_COUNT;
        let p1 = npcPathNodes[i];
        let p2 = npcPathNodes[(i + 1) % NODE_COUNT];
        let len = segmentLengths[i];

        let t = 0;
        if (len > 0) {
            t = ((px - p1.x) * (p2.x - p1.x) + (pz - p1.z) * (p2.z - p1.z)) / (len * len);
            t = Math.max(0, Math.min(1, t));
        }
        let projX = p1.x + t * (p2.x - p1.x);
        let projZ = p1.z + t * (p2.z - p1.z);
        let dist = Math.sqrt((px - projX)**2 + (pz - projZ)**2);

        if (dist < bestDist) {
            bestDist = dist;
            bestSegment = i;
            let accumulatedLength = 0;
            for (let k = 0; k < i; k++) accumulatedLength += segmentLengths[k];
            bestProgress = (accumulatedLength + t * len) / totalTrackLength;
        }
    }
    lastPlayerSegment = bestSegment;
    return bestProgress;
}

function getPlayerRank() {
    if (raceState === 0 || raceState === 1) return 1;
    let myRank = 1;
    playerProgress = (itemBulletTimer > 0) ? bulletProgress : calculatePlayerProgress();
    let playerProgressVal = playerLap + playerProgress;
    
    npcs.forEach(npc => {
        let npcProgressVal = npc.lap + npc.progress;
        if (npcProgressVal > playerProgressVal) {
            myRank++;
        }
    });
    return myRank;
}

function getNpcRank(targetNpc) {
    let rank = 1;
    const targetProgress = targetNpc.lap + targetNpc.progress;
    npcs.forEach(other => {
        if (other === targetNpc) return;
        const otherProgress = other.lap + other.progress;
        if (otherProgress > targetProgress) rank++;
    });
    const playerProgressVal = playerLap + playerProgress;
    if (playerProgressVal > targetProgress) rank++;
    return rank;
}

function detectNpcObstacles(npc) {
    const lookAhead = 25;
    const px = npc.mesh.position.x;
    const pz = npc.mesh.position.z;
    const angle = npc.mesh.rotation.y;
    
    const frontX = px + Math.sin(angle) * lookAhead;
    const frontZ = pz + Math.cos(angle) * lookAhead;
    
    npc.frontObstacle = null;
    npc.frontObstacleDist = Infinity;
    
    if (frontX > RIGHT_WALL_X - 6 && frontX < RIGHT_WALL_X + 6 && frontZ > -150 && frontZ < 50) {
        npc.frontObstacle = 'wall_right';
        npc.frontObstacleDist = Math.abs(frontX - RIGHT_WALL_X);
        return;
    }
    if (frontX > LEFT_WALL_X - 6 && frontX < LEFT_WALL_X + 6 && frontZ > -150 && frontZ < 50) {
        npc.frontObstacle = 'wall_left';
        npc.frontObstacleDist = Math.abs(frontX - LEFT_WALL_X);
        return;
    }
    
    const poleDist1 = Math.sqrt(Math.pow(frontX - pole1Group.position.x, 2) + Math.pow(frontZ - pole1Group.position.z, 2));
    const poleDist2 = Math.sqrt(Math.pow(frontX - pole2Group.position.x, 2) + Math.pow(frontZ - pole2Group.position.z, 2));
    if (poleDist1 < 12) {
        npc.frontObstacle = 'pole1';
        npc.frontObstacleDist = poleDist1;
        return;
    }
    if (poleDist2 < 12) {
        npc.frontObstacle = 'pole2';
        npc.frontObstacleDist = poleDist2;
        return;
    }
    
    if (frontX > -80 && frontX < 330 && frontZ > -460 && frontZ < -340) {
        const onBridge = (frontX > -25 && frontX < 25) || (frontX > 100 && frontX < 150) || (frontX > 225 && frontX < 275);
        if (!onBridge) {
            npc.frontObstacle = 'water';
            npc.frontObstacleDist = Math.min(Math.abs(frontZ + 340), Math.abs(frontZ + 460));
            return;
        }
    }
    
    npcs.forEach(other => {
        if (other === npc) return;
        const dx = other.mesh.position.x - px;
        const dz = other.mesh.position.z - pz;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if (dist > 20) return;
        const angleToOther = Math.atan2(dx, dz);
        let angleDiff = angleToOther - angle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        if (Math.abs(angleDiff) < 0.8 && dist < npc.frontObstacleDist) {
            npc.frontObstacle = other;
            npc.frontObstacleDist = dist;
        }
    });
}

function updateNpcState(npc) {
    if (npc.isSquished > 0 || npc.isStar > 0) {
        npc.state = NPC_STATE.NORMAL;
        return;
    }
    
    const rank = getNpcRank(npc);
    const isLeading = rank <= 3;
    const isTrailing = rank >= 9;
    
    detectNpcObstacles(npc);
    
    npc.thinkTimer = (npc.thinkTimer || 0) - 1;
    if (npc.thinkTimer <= 0) {
        npc.thinkTimer = 10 + Math.floor(Math.random() * 20);
        
        if (npc.frontObstacle && npc.frontObstacleDist < 12) {
            npc.state = NPC_STATE.AVOIDING;
            npc.avoidTimer = 20 + Math.floor(Math.random() * 20);
            const obs = npc.frontObstacle;
            if (obs === 'wall_right' || obs === 'pole1' || obs === 'pole2') {
                npc.targetOffset = -6 - Math.random() * 4;
            } else if (obs === 'wall_left') {
                npc.targetOffset = 6 + Math.random() * 4;
            } else if (obs === 'water') {
                const px = npc.mesh.position.x;
                const bridgeTargets = [0, 125, 250];
                let nearest = bridgeTargets.reduce((a, b) => Math.abs(a - px) < Math.abs(b - px) ? a : b);
                npc.targetOffset = (nearest - px) * 0.3;
            } else if (obs && obs.mesh) {
                const side = Math.random() > 0.5 ? 1 : -1;
                npc.targetOffset = side * (5 + Math.random() * 3);
            }
            npc.lastStateChange = 60;
            return;
        }
        
        if (npc.frontObstacle && npc.frontObstacle.mesh && npc.frontObstacleDist < 15) {
            npc.state = NPC_STATE.SLIPSTREAM;
            npc.slipstreamTimer = 20;
            npc.lastStateChange = 30;
            return;
        }
        
        if (!isLeading && npc.frontObstacle && npc.frontObstacle.mesh && npc.frontObstacleDist < 12) {
            npc.state = NPC_STATE.OVERTAKING;
            npc.overtakeTimer = 30;
            const side = Math.random() > 0.5 ? 1 : -1;
            npc.targetOffset = side * (6 + Math.random() * 3);
            npc.lastStateChange = 40;
            return;
        }
        
        if (isLeading && rank <= 5) {
            let behindNpc = null;
            let behindDist = Infinity;
            const px = npc.mesh.position.x;
            const pz = npc.mesh.position.z;
            const angle = npc.mesh.rotation.y;
            
            npcs.forEach(other => {
                if (other === npc) return;
                const dx = other.mesh.position.x - px;
                const dz = other.mesh.position.z - pz;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if (dist > 20) return;
                const angleToOther = Math.atan2(dx, dz);
                let angleDiff = angleToOther - angle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                if (Math.abs(angleDiff) > 1.5 && dist < behindDist) {
                    behindNpc = other;
                    behindDist = dist;
                }
            });
            
            const pdx = carGroup.position.x - px;
            const pdz = carGroup.position.z - pz;
            const pdist = Math.sqrt(pdx*pdx + pdz*pdz);
            if (pdist < 20) {
                const pAngle = Math.atan2(pdx, pdz);
                let pDiff = pAngle - angle;
                while (pDiff > Math.PI) pDiff -= Math.PI * 2;
                while (pDiff < -Math.PI) pDiff += Math.PI * 2;
                if (Math.abs(pDiff) > 1.5 && pdist < behindDist) {
                    behindNpc = 'player';
                    behindDist = pdist;
                }
            }
            
            if (behindNpc && behindDist < 10 && Math.random() < npc.aggression * 0.5) {
                npc.state = NPC_STATE.BLOCKING;
                npc.blockTimer = 40 + Math.floor(Math.random() * 30);
                if (behindNpc === 'player') {
                    const pdx2 = carGroup.position.x - px;
                    const pdz2 = carGroup.position.z - pz;
                    const pAngle2 = Math.atan2(pdx2, pdz2);
                    const blockSide = Math.sin(pAngle2 - angle) > 0 ? 1 : -1;
                    npc.targetOffset = -blockSide * 3;
                } else if (behindNpc.mesh) {
                    const bdx = behindNpc.mesh.position.x - px;
                    const bdz = behindNpc.mesh.position.z - pz;
                    const bAngle = Math.atan2(bdx, bdz);
                    const blockSide = Math.sin(bAngle - angle) > 0 ? 1 : -1;
                    npc.targetOffset = -blockSide * 3;
                }
                npc.lastStateChange = 50;
                return;
            }
        }
        
        if (npc.boostTimer > 0) {
            npc.state = NPC_STATE.BOOSTING;
            return;
        }
        
        npc.state = NPC_STATE.NORMAL;
        npc.targetOffset = 0;
    }
}

function updateNpcItemStrategy(npc) {
    if (!npc.heldItem || npc.itemUseTimer > 0) return;
    
    const rank = getNpcRank(npc);
    const isLeading = rank <= 3;
    const isTrailing = rank >= 9;
    const hasFrontCar = npc.frontObstacle && npc.frontObstacle.mesh;
    const frontDist = npc.frontObstacleDist || Infinity;
    
    let nearbyCount = 0;
    npcs.forEach(other => {
        if (other === npc) return;
        if (npc.mesh.position.distanceTo(other.mesh.position) < 15) nearbyCount++;
    });
    if (carGroup.position.distanceTo(npc.mesh.position) < 15) nearbyCount++;
    
    let shouldUse = false;
    
    switch(npc.heldItem) {
        case "キノコ":
            if (hasFrontCar && frontDist < 12) shouldUse = true;
            const px = npc.mesh.position.x;
            const pz = npc.mesh.position.z;
            const isOnDirt = !(px > -40 && px < 40 && pz > -150 && pz < 350) &&
                            !(px > -340 && px < 40 && pz > -240 && pz < -160) &&
                            !(px > -340 && px < -260 && pz > -440 && pz < -160);
            if (isOnDirt) shouldUse = true;
            if (Math.random() < 0.01 * npc.aggression) shouldUse = true;
            break;
        case "金キノコ":
            if (!isLeading) shouldUse = true;
            if (Math.random() < 0.02) shouldUse = true;
            break;
        case "緑甲羅":
            if (hasFrontCar && frontDist < 20) shouldUse = true;
            if (Math.random() < 0.015 * npc.aggression) shouldUse = true;
            break;
        case "赤甲羅":
            const pdx = carGroup.position.x - npc.mesh.position.x;
            const pdz = carGroup.position.z - npc.mesh.position.z;
            const pDist = Math.sqrt(pdx*pdx + pdz*pdz);
            const angle = npc.mesh.rotation.y;
            const pAngle = Math.atan2(pdx, pdz);
            let pDiff = pAngle - angle;
            while (pDiff > Math.PI) pDiff -= Math.PI * 2;
            while (pDiff < -Math.PI) pDiff += Math.PI * 2;
            if (pDist < 25 && Math.abs(pDiff) < 1.0) {
                shouldUse = true;
            } else if (hasFrontCar && frontDist < 20) {
                shouldUse = true;
            }
            if (Math.random() < 0.01 * npc.aggression) shouldUse = true;
            break;
        case "サンダー":
            let aheadCount = 0;
            npcs.forEach(other => {
                if (other === npc) return;
                if (other.lap + other.progress > npc.lap + npc.progress) aheadCount++;
            });
            if (aheadCount >= 3) shouldUse = true;
            if (nearbyCount >= 4) shouldUse = true;
            if (Math.random() < 0.005 * npc.aggression) shouldUse = true;
            break;
        case "デカキノコ":
            if (!isLeading || nearbyCount >= 3) shouldUse = true;
            if (Math.random() < 0.01) shouldUse = true;
            break;
        case "スター":
            if (nearbyCount >= 3 || isTrailing) shouldUse = true;
            if (Math.random() < 0.005 * npc.aggression) shouldUse = true;
            break;
        case "テレサ":
            if (hasFrontCar) shouldUse = true;
            if (Math.random() < 0.015) shouldUse = true;
            break;
        default:
            if (Math.random() < 0.005) shouldUse = true;
    }
    
    if (shouldUse) {
        useNpcItem(npc);
    }
}

function updateNpcMovement(npc, nSpeed) {
    let speedMod = 1.0;
    
    switch(npc.state) {
        case NPC_STATE.AVOIDING:
            speedMod = 0.85;
            npc.avoidTimer--;
            if (npc.avoidTimer <= 0) {
                npc.targetOffset *= 0.9;
                if (Math.abs(npc.targetOffset) < 0.5) npc.targetOffset = 0;
            }
            break;
        case NPC_STATE.SLIPSTREAM:
            speedMod = 1.15;
            npc.slipstreamTimer--;
            if (npc.slipstreamTimer <= 0) {
                if (npc.frontObstacle && npc.frontObstacle.mesh && npc.frontObstacleDist < 10) {
                    npc.state = NPC_STATE.OVERTAKING;
                    npc.overtakeTimer = 20;
                    const side = Math.random() > 0.5 ? 1 : -1;
                    npc.targetOffset = side * 5;
                }
            }
            break;
        case NPC_STATE.OVERTAKING:
            speedMod = 1.2;
            npc.overtakeTimer--;
            if (npc.overtakeTimer <= 0 || !npc.frontObstacle) {
                npc.state = NPC_STATE.NORMAL;
                npc.targetOffset = 0;
            }
            break;
        case NPC_STATE.BLOCKING:
            speedMod = 0.9;
            npc.blockTimer--;
            if (npc.blockTimer <= 0) {
                npc.state = NPC_STATE.NORMAL;
                npc.targetOffset = 0;
            }
            break;
        case NPC_STATE.BOOSTING:
            speedMod = 1.3;
            break;
        default:
            npc.targetOffset *= 0.95;
            if (Math.abs(npc.targetOffset) < 0.1) npc.targetOffset = 0;
            break;
    }
    
    const skillFactor = 0.85 + npc.skill * 0.3;
    return nSpeed * speedMod * skillFactor;
}

function getRandomItemByRank(rank) {
    if (raceState !== 2) {
        return itemTypes[Math.floor(Math.random() * itemTypes.length)];
    }
    
    let pool = [];
    if (rank <= 3) {
        pool = ["キノコ", "キノコ", "緑甲羅", "緑甲羅", "赤甲羅", "テレサ"];
    } else if (rank <= 7) {
        pool = ["キノコ", "赤甲羅", "赤甲羅", "デカキノコ", "金キノコ", "スター", "テレサ"];
    } else {
        pool = ["金キノコ", "スター", "スター", "サンダー", "テレサ", "テレサ"];
    }
    return pool[Math.floor(Math.random() * pool.length)];
}

        }
        turboText.style.color = "#eeeeee";
    }

    heldItems[0] = heldItems[1]; heldItems[1] = null; updateItemUI();
}

function useNpcItem(npc) {
    if (!npc.heldItem) return;
    const item = npc.heldItem; npc.heldItem = null;
    if (item === "キノコ" || item === "金キノコ" || item === "デカキノコ" || item === "スター") {
        npc.boostTimer = 100; if (item === "デカキノコ") npc.isMega = 200; if (item === "スター") npc.isStar = 200;
    } else if (item === "緑甲羅") {
        const sm = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshStandardMaterial({ color: 0x33cc33 }));
        sm.position.copy(npc.mesh.position).y += 0.5;
        const dir = new THREE.Vector3(-Math.sin(npc.mesh.rotation.y), 0, -Math.cos(npc.mesh.rotation.y)).normalize();
        sm.position.addScaledVector(dir, 4.0); scene.add(sm); shells.push({ mesh: sm, dir: dir, type: "green", life: 250 });
    } else if (item === "赤甲羅") {
        const sm = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff3333 }));
        sm.position.copy(npc.mesh.position).y += 0.5; scene.add(sm); 
        if (Math.random() < 0.4) {
            shells.push({ mesh: sm, type: "red_to_player", life: 350 }); 
        } else {
            let target = npcs[Math.floor(Math.random() * npcs.length)];
            shells.push({ mesh: sm, type: "red", targetNpc: target, life: 400 });
        }
    } else if (item === "サンダー") {
        if (itemMegaTimer <= 0 && itemStarTimer <= 0 && itemBooTimer <= 0 && itemBulletTimer <= 0 && playerHitInvincibleTimer <= 0) { 
            isSquishedTimer = 120; speed = 0; turboTimer = 0; isDrifting = false; driftCharge = 0; turboState = 0; itemMushroomTimer = 0; itemGoldenTimer = 0; soundHit(); 
            dropPlayerItems();
            dropCoins();
            playerHitInvincibleTimer = 180; 
            const tx = document.getElementById("turbo-ui"); tx.innerText = "⚡ ライバルのサンダーを喰らった！！コインとアイテムを失った！ ⚡"; tx.style.color = "#bb33ff";
        } else {
            const tx = document.getElementById("turbo-ui"); tx.innerText = "🛡️ 無敵判定によりライバルのサンダーを完全無効化！ 🛡️"; tx.style.color = "#ffff00";
        }
        npcs.forEach(other => { if (other !== npc && other.isMega <= 0 && other.isStar <= 0) { dropNpcItems(other); other.isSquished = 120; other.boostTimer = 0; } });
    } else if (item === "テレサ") {
        npc.isBoo = 150;
        if (heldItems[0] || heldItems[1]) {
            if (heldItems[1]) { npc.heldItem = heldItems[1]; heldItems[1] = null; }
            else { npc.heldItem = heldItems[0]; heldItems[0] = null; }
            updateItemUI();
        } else {
            let targets = npcs.filter(n => n !== npc && n.heldItem);
            if (targets.length > 0) {
                let target = targets[Math.floor(Math.random() * targets.length)];
                npc.heldItem = target.heldItem; target.heldItem = null;
            }
        }
        if (npc.heldItem) npc.itemUseTimer = Math.floor(Math.random() * 60) + 20;
    }
}

const carPos = carGroup.position;

function animate() {
    requestAnimationFrame(animate);
    const turboText = document.getElementById("turbo-ui");
    const statusText = document.getElementById("status-text");
    const rankText = document.getElementById("rank-text");
    const lapText = document.getElementById("lap-text");
    const countdownEl = document.getElementById("countdown");
    const npcStatusEl = document.getElementById("npc-status");

    gearGroup.rotation.z += 0.008; alertLight.intensity = Math.sin(Date.now() * 0.01) * 0.8 + 0.8;

    if (playerHitInvincibleTimer > 0) playerHitInvincibleTimer--;

    // ============================================================
    // 📷 カメラ制御（Zキーで反転）
    // ============================================================
    const camDist = 18;
    const camHeight = 12;
    const target = carGroup.position.clone();

    if (cameraFlipped) {
        // 後方視点（車の前から後ろを見る）
        const forward = new THREE.Vector3(-Math.sin(carGroup.rotation.y), 0, -Math.cos(carGroup.rotation.y));
        camera.position.copy(target).addScaledVector(forward, camDist);
        camera.position.y = camHeight;
        camera.lookAt(target.x, 0, target.z);
    } else {
        // ノーマル視点（後ろ上から）
        const behind = new THREE.Vector3(Math.sin(carGroup.rotation.y), 0, Math.cos(carGroup.rotation.y));
        camera.position.copy(target).addScaledVector(behind, camDist);
        camera.position.y = camHeight;
        camera.lookAt(target.x, 0, target.z);
    }

    let inEntryZone = (carPos.x > -entryZoneGeo.parameters.width/2 && carPos.x < entryZoneGeo.parameters.width/2 && carPos.z > 80 && carPos.z < 140);

    if (raceState === 0) {
        rankText.innerText = "順位: 自由走行中"; lapText.innerText = "Lap: --";
        let targetText = inEntryZone ? "【E】キーで20周耐久レース開始！" : "黄色のエリアへ向かおう";
        if (targetText !== lastCenterText) { countdownEl.innerText = targetText; lastCenterText = targetText; centerUiTimer = 5000; }
        if (centerUiTimer > 0) { centerUiTimer -= 16.66; if (centerUiTimer <= 0) countdownEl.innerText = ""; }
        if (inEntryZone && keys.e) { keys.e = false; startRaceGridPlacement(); raceState = 1; countdownTime = 4000; rocketTimer = 0; rocketFailed = false; lastCenterText = ""; }
    } else if (raceState === 1) {
        countdownTime -= 16.66; let seconds = countdownTime / 1000; let secInt = Math.floor(seconds);
        if (seconds > 3) { countdownEl.innerText = "3"; if(lastSecondsInt !== 3){ soundCount(); lastSecondsInt = 3; } }
        else if (seconds > 2) { countdownEl.innerText = "2"; if(lastSecondsInt !== 2){ soundCount(); lastSecondsInt = 2; } if (keys.w) rocketTimer += 16.66; }
        else if (seconds > 1) { countdownEl.innerText = "1"; if(lastSecondsInt !== 1){ soundCount(); lastSecondsInt = 1; } if (keys.w && rocketTimer > 400) rocketFailed = true; }
        else if (seconds > 0) {
            countdownEl.innerText = "GO!!"; raceState = 2; soundGo();
            if (rocketTimer > 300 && rocketTimer < 950 && !rocketFailed) { turboTimer = 30; soundBoost(); turboText.innerText = "🚀 ロケットスタート！ 🚀"; }
            else if (rocketFailed) { speed = -0.2; turboTimer = -20; soundHit(); turboText.innerText = "💨 エンスト！ 💨"; }
        }
    } else if (raceState === 2) {
        if (countdownTime > -1000) { countdownTime -= 16.66; if (countdownTime <= 0) countdownEl.innerText = ""; }
    } else if (raceState === 3) {
        if (lastCenterText !== "FINISH!!") { countdownEl.innerText = "FINISH!! (耐久完走！)"; lastCenterText = "FINISH!!"; centerUiTimer = 5000; }
        if (centerUiTimer > 0) { centerUiTimer -= 16.66; if (centerUiTimer <= 0) countdownEl.innerText = ""; }
    }

    // 甲羅処理
    for (let i = shells.length - 1; i >= 0; i--) {
        const shell = shells[i]; const sSpeed = 3.5; shell.life--;
        if (shell.type === "green") {
            shell.mesh.position.addScaledVector(shell.dir, sSpeed); shell.mesh.rotation.y += 0.1;
        } else if (shell.type === "red" && shell.targetNpc) {
            const tPos = shell.targetNpc.mesh.position;
            const sDir = new THREE.Vector3().subVectors(tPos, shell.mesh.position); sDir.y = 0; sDir.normalize();
            shell.mesh.position.addScaledVector(sDir, sSpeed); shell.mesh.lookAt(tPos.x, shell.mesh.position.y, tPos.z);
        } else if (shell.type === "red_to_player") {
            const tPos = carGroup.position;
            const sDir = new THREE.Vector3().subVectors(tPos, shell.mesh.position); sDir.y = 0; sDir.normalize();
            shell.mesh.position.addScaledVector(sDir, sSpeed); shell.mesh.lookAt(tPos.x, shell.mesh.position.y, tPos.z);
            if (shell.mesh.position.distanceTo(carGroup.position) < 5.5) {
                if (isItemShielding) {
                    isItemShielding = false; if (shieldShellMesh) { carGroup.remove(shieldShellMesh); shieldShellMesh = null; }
                    heldItems[0] = heldItems[1]; heldItems[1] = null; updateItemUI(); soundHit();
                    turboText.innerText = "🛡️ ガード成功！後ろの甲羅で防いだ！ 🛡️"; turboText.style.color = "#00ff00";
                } else if (itemMegaTimer <= 0 && itemStarTimer <= 0 && itemBooTimer <= 0 && itemBulletTimer <= 0) { 
                    if (playerHitInvincibleTimer > 0) {
                        turboText.innerText = "🛡️ 被弾無敵バリアにより甲羅を弾き飛ばした！ 🛡️"; turboText.style.color = "#33ffff";
                    } else {
                        isSquishedTimer = 90; speed = 0; turboTimer = 0; isDrifting = false; driftCharge = 0; turboState = 0; itemMushroomTimer = 0; itemGoldenTimer = 0; 
                        playerHitInvincibleTimer = 180; 
                        soundHit(); 
                        dropCoins();
                        turboText.innerText = "💥 被弾！赤甲羅を喰らった！！ 💥"; turboText.style.color = "#ff3333";
                    }
                } else { turboText.innerText = "🛡️ 無敵状態で甲羅を粉砕！ 🛡️"; turboText.style.color = "#ffff00"; }
                shell.life = 0;
            }
        }
        let hasHit = false;
        if (shell.type !== "red_to_player") {
            for (let j = 0; j < npcs.length; j++) {
                const npc = npcs[j];
                if (shell.mesh.position.distanceTo(npc.mesh.position) < 5.5) { 
                    if (npc.isMega <= 0 && npc.isStar <= 0) { npc.isSquished = 120; npc.boostTimer = 0; }
                    hasHit = true; soundHit(); turboText.innerText = `🎯 甲羅がライバルに命中！ 🎯`; turboText.style.color = "#00ff00"; break; 
                }
            }
        }
        if (hasHit || shell.life <= 0 || shell.mesh.position.length() > 5000) { scene.remove(shell.mesh); shells.splice(i, 1); }
    }

    // ドロップアイテム回収
    for (let i = droppedItems.length - 1; i >= 0; i--) {
        const dItem = droppedItems[i]; dItem.timer--; dItem.mesh.position.y = 2.0 + Math.sin(Date.now() * 0.007) * 0.4; 
        const distXZ = Math.sqrt(Math.pow(carGroup.position.x - dItem.mesh.position.x, 2) + Math.pow(carGroup.position.z - dItem.mesh.position.z, 2));

        if (distXZ < 4.5) {
            if (dItem.type === "コイン") {
                if (coins < 10) coins++;
                playTone(587.33, 0.08, 'sine', 0.1);
                document.getElementById("coin-text").innerText = `🪙 コイン: ${coins}/10`;
                scene.remove(dItem.mesh); droppedItems.splice(i, 1); continue;
            }
            if (!isItemRoulette) {
                soundItem();
                if (!heldItems[0]) { heldItems[0] = dItem.type; updateItemUI(); scene.remove(dItem.mesh); droppedItems.splice(i, 1); continue; } 
                else if (!heldItems[1]) { heldItems[1] = dItem.type; updateItemUI(); scene.remove(dItem.mesh); droppedItems.splice(i, 1); continue; }
            }
        }
        let npcPicked = false;
        for (let j = 0; j < npcs.length; j++) {
            const npcDistXZ = Math.sqrt(Math.pow(npcs[j].mesh.position.x - dItem.mesh.position.x, 2) + Math.pow(npcs[j].mesh.position.z - dItem.mesh.position.z, 2));
            if (!npcs[j].heldItem && npcDistXZ < 9 && dItem.type !== "コイン") {
                npcs[j].heldItem = dItem.type; npcs[j].itemUseTimer = Math.floor(Math.random() * 120) + 60;
                scene.remove(dItem.mesh); droppedItems.splice(i, 1); npcPicked = true; break;
            }
        }
        if (npcPicked) continue;
        if (dItem.timer <= 0) { scene.remove(dItem.mesh); droppedItems.splice(i, 1); }
    }

    // コイン回収
    coinsArray.forEach(c => {
        if (!c.collected) {
            c.mesh.rotation.z = Math.sin(Date.now() * 0.005) * 0.15;
            const distXZ = Math.sqrt(Math.pow(carGroup.position.x - c.mesh.position.x, 2) + Math.pow(carGroup.position.z - c.mesh.position.z, 2));
            if (distXZ < 5.0 && carY <= 3.0) {
                c.collected = true;
                c.mesh.visible = false;
                if (coins < 10) coins++;
                playTone(587.33, 0.08, 'sine', 0.1);
                setTimeout(() => playTone(880, 0.12, 'sine', 0.1), 40);
                document.getElementById("coin-text").innerText = `🪙 コイン: ${coins}/10`;
            }
        }
    });

    if (itemGoldenTimer > 0) { itemGoldenTimer--; if (itemGoldenTimer % 10 === 0) updateItemUI(); if (itemGoldenTimer <= 0) { updateItemUI(); turboText.innerText = ""; } }
    if (itemStarTimer > 0) { itemStarTimer--; if (itemStarTimer % 10 === 0) updateItemUI(); if (itemStarTimer <= 0) { updateItemUI(); turboText.innerText = ""; } }
    if (itemBooTimer > 0) { itemBooTimer--; if (itemBooTimer % 10 === 0) updateItemUI(); if (itemBooTimer <= 0) { updateItemUI(); turboText.innerText = ""; } }
    if (itemBulletTimer > 0) { itemBulletTimer--; if (itemBulletTimer % 10 === 0) updateItemUI(); }

    if (isItemRoulette) {
        rouletteTimer -= 16.66; const randomItemStr = "🎲 " + getEmojiForItem(itemTypes[Math.floor(Math.random() * itemTypes.length)]);
        if (rouletteSlot === 0) document.getElementById("item-slot-1").innerHTML = randomItemStr;
        else if (rouletteSlot === 1) document.getElementById("item-slot-2").innerHTML = randomItemStr;
        if (rouletteTimer <= 0) { 
            isItemRoulette = false; 
            soundItem(); 
            let newItem = getRandomItemByRank(getPlayerRank()); 
            let targetSlot = rouletteSlot;
            if (heldItems[targetSlot]) { targetSlot = (targetSlot === 0) ? 1 : 0; }
            if (!heldItems[targetSlot]) {
                heldItems[targetSlot] = newItem; 
            } else {
                spawnDroppedItem(newItem, carGroup.position);
            }
            rouletteSlot = -1; 
            updateItemUI(); 
        }
    }

    if (poleSpinTimer > 0) {
        poleSpinTimer--; isDrifting = false; isWallRiding = false;
        carModel.rotation.y += 0.4;

                npc.isSquished = 120; npc.boostTimer = 0; 
                soundHit();
                turboText.innerText = "⭐ スター体当たり！ライバルをブッ飛ばした！ ⭐"; turboText.style.color = "#ffff00";
            }
        });

    // 表示エフェクト

        carModel.material.transparent = false; carModel.material.opacity = 1.0;
    } else {

    // 壁走り
    let padding = 2.0; 
    if (wallKickIgnoreTimer > 0) wallKickIgnoreTimer--;
    
    if (inFactory && wallKickIgnoreTimer === 0 && poleSpinTimer <= 0 && itemBulletTimer <= 0) {
        if (carY > 0.5 && !isWallRiding && Math.abs(wallKickVelocityX) < 0.3) {
            let entered = false;
            if (carPos.x >= RIGHT_WALL_X - padding - 1.5) { isWallRiding = true; wallRideSide = 1; jumpVelocity = 0; entered = true; } 
            else if (carPos.x <= LEFT_WALL_X + padding + 1.5) { isWallRiding = true; wallRideSide = -1; jumpVelocity = 0; entered = true; }
            if (entered) {
                speed = Math.max(speed, baseMaxSpeed);
                carGroup.rotation.y = (Math.cos(carGroup.rotation.y) > 0) ? 0 : Math.PI; 
            }
        }
    } else { isWallRiding = false; }

    if (isWallRiding && inFactory) {
        areaStatus = "🧱 WALL RIDING !! 🧱"; if (carY < 6.0) carY = THREE.MathUtils.lerp(carY, 7.0, 0.1);
        wallKickVelocityX = 0; 
        if (wallRideSide === 1) { carPos.x = RIGHT_WALL_X - padding; carModel.rotation.z = -Math.PI / 2; } 
        else { carPos.x = LEFT_WALL_X + padding; carModel.rotation.z = Math.PI / 2; }
        carGroup.rotation.y = (Math.cos(carGroup.rotation.y) > 0) ? 0 : Math.PI; 
        if (carPos.z <= -148 || carPos.z >= 48 || Math.abs(speed) < 0.2) isWallRiding = false;
    } else if (poleSpinTimer <= 0 && itemBulletTimer <= 0) {
        if (jumpActionTimer <= 0) { 
            if (Math.abs(wallKickVelocityX) > 0.1) carModel.rotation.z += 0.22 * Math.sign(wallKickVelocityX); 
            else carModel.rotation.z = THREE.MathUtils.lerp(carModel.rotation.z, 0, 0.2); 
        }
        carPos.x += wallKickVelocityX; wallKickVelocityX *= 0.90;
        if (inFactory) {
            if (carPos.x >= RIGHT_WALL_X - padding) { carPos.x = RIGHT_WALL_X - padding; speed *= 0.7; wallKickVelocityX = 0; }
            if (carPos.x <= LEFT_WALL_X + padding) { carPos.x = LEFT_WALL_X + padding; speed *= 0.7; wallKickVelocityX = 0; }
        }
    }

    // アイテムボックス判定
    itemBoxes.forEach(box => {
        box.mesh.rotation.y += 0.03;
        if (box.respawnTimer > 0) { box.respawnTimer--; if (box.respawnTimer === 0) box.mesh.visible = true; } 
        else if (box.mesh.visible) {
            if (carPos.distanceTo(box.mesh.position) < 8) {
                box.mesh.visible = false; box.respawnTimer = 300;
                if (!isItemRoulette && itemBulletTimer <= 0) {
                    soundItem();
                    if (!heldItems[0]) { isItemRoulette = true; rouletteSlot = 0; rouletteTimer = 1000; } 
                    else if (!heldItems[1]) { isItemRoulette = true; rouletteSlot = 1; rouletteTimer = 1000; }
                }
            } else {
                for (let j = 0; j < npcs.length; j++) {
                    if (npcs[j].mesh.position.distanceTo(box.mesh.position) < 14) {
                        box.mesh.visible = false; box.respawnTimer = 300;
                        if (!npcs[j].heldItem && npcs[j].boostTimer <= 0) { 
                            let npcItem = getRandomItemByRank(getNpcRank(npcs[j]));
                            if (npcItem === "サンダー" && Math.random() > 0.15) { npcItem = "キノコ"; }
                            npcs[j].heldItem = npcItem; 
                            npcs[j].itemUseTimer = Math.floor(Math.random() * 60) + 20; 
                        }
                        break;
                    }
                }
            }
        }
    });

    if (isSquishedTimer > 0) { isSquishedTimer--; carGroup.scale.set(1.6, 0.08, 1.6); if (isSquishedTimer === 0) carGroup.scale.set(1, 1, 1); }
    if (itemMegaTimer > 0) { itemMegaTimer--; carGroup.scale.set(2.5, 2.5, 2.5); if (itemMegaTimer === 0) carGroup.scale.set(1, 1, 1); }

    // 物理計算
    let maxSpeed = baseMaxSpeed * (1.0 + (coins * 0.005)); 
    let accel = 0.04; let decel = 0.015;
    let isWaterOn = false; let targetBaseY = 0; let onRoad = false;
    
    if (carPos.x > -40 && carPos.x < 40 && carPos.z > -150 && carPos.z < 350) onRoad = true; 
    if (carPos.x > -340 && carPos.x < 40 && carPos.z > -240 && carPos.z < -160) onRoad = true; 
    if (carPos.x > -340 && carPos.x < -260 && carPos.z > -440 && carPos.z < -160) onRoad = true; 
    if (carPos.x > -340 && carPos.x < -100 && carPos.z > -440 && carPos.z < -360) onRoad = true; 
    
    let inPoolZone = (carPos.x >= -80 && carPos.x <= 330 && carPos.z > -460 && carPos.z < -340);
    if (inPoolZone) {
        onRoad = true;
        let onB1 = (carPos.x >= -25 && carPos.x <= 25); let onB2 = (carPos.x >= 100 && carPos.x <= 150); let onB3 = (carPos.x >= 225 && carPos.x <= 275);
        if (onB1 || onB2 || onB3 || carPos.x > 300) { targetBaseY = 0.0; areaStatus = "【🌉 プールの一本橋】"; } 
        else { targetBaseY = -1.0; if (carY <= -0.8 && itemMushroomTimer <= 0 && itemGoldenTimer <= 0 && itemStarTimer <= 0 && itemBooTimer <= 0 && itemBulletTimer <= 0) { areaStatus = "【🌊 プール水没減速】"; maxSpeed = 0.45; accel = 0.01; isWaterOn = true; } }
    }

    if (carPos.x > 310 && carPos.x < 390 && carPos.z > -440 && carPos.z < -60) onRoad = true; 
    if (carPos.x > 160 && carPos.x < 390 && carPos.z > -140 && carPos.z < -60) onRoad = true; 
    if (carPos.x > 160 && carPos.x < 240 && carPos.z > -140 && carPos.z < 290) onRoad = true; 
    if (carPos.x > -40 && carPos.x < 240 && carPos.z > 210 && carPos.z < 290) onRoad = true; 

    let isDirt = (raceState === 2 && !onRoad && carY <= targetBaseY + 0.1 && itemMushroomTimer <= 0 && itemMegaTimer <= 0 && itemGoldenTimer <= 0 && itemStarTimer <= 0 && itemBooTimer <= 0 && itemBulletTimer <= 0);
    if (isDirt) {
        areaStatus = "【🟫 泥エリア！ダート超減速中】";
        maxSpeed = 0.15; accel = 0.005;
        if (turboTimer > 0) turboTimer = 0; 
    }
    
    if (itemBooTimer > 0) {
        areaStatus = "【👻 テレサ無敵・ダート無視中】";
        maxSpeed = baseMaxSpeed * 1.25;
        accel = 0.08;
    }

    if (itemBulletTimer > 0) {
        areaStatus = "【🚀 キラー突進走行中！！！】";
    }

    statusText.innerText = areaStatus;

    if (Math.abs(carPos.x - ramp.position.x) < 30 && Math.abs(carPos.z - ramp.position.z) < 30 && carY <= targetBaseY + 0.15) { jumpVelocity = 0.55; speed = Math.max(speed, 2.4); hasJumpActioned = false; soundBoost(); turboText.innerText = "💨 ジャンプ台発動！！！ 💨"; turboText.style.color = "#ff8800"; }
    if (carPos.x > 10 && carPos.x < 30 && Math.abs(carPos.z - smallRamp1.position.z) < 20 && carY <= targetBaseY + 0.15) { jumpVelocity = 0.55; speed = Math.max(speed, 2.4); hasJumpActioned = false; soundBoost(); turboText.innerText = "💨 小ジャンプ！ 💨"; turboText.style.color = "#ff8800"; }
    if (carPos.x > 135 && carPos.x < 155 && Math.abs(carPos.z - smallRamp2.position.z) < 20 && carY <= targetBaseY + 0.15) { jumpVelocity = 0.55; speed = Math.max(speed, 2.4); hasJumpActioned = false; soundBoost(); turboText.innerText = "💨 小ジャンプ！ 💨"; turboText.style.color = "#ff8800"; }

    if (jumpActionTimer > 0) { 
        jumpActionTimer--; 
        carModel.rotation.y += 0.35; 
        carModel.rotation.x += jumpRotX;
        carModel.rotation.z += jumpRotZ;
        if (jumpActionTimer === 0) carModel.rotation.set(0, 0, 0); 
    }

    if (!isWallRiding && itemBulletTimer <= 0) {
        if (carY > targetBaseY || jumpVelocity > 0) { 
            carY += jumpVelocity; jumpVelocity -= 0.022; 
            if (carY < targetBaseY) { 
                carY = targetBaseY; jumpVelocity = 0; 
                if (wallKickCount > 0) { 
                    turboTimer = 15 + (wallKickCount * 12);
                    turboText.innerText = `💨 着地ブースト！ [壁キック:${wallKickCount}回] 💨`;
                    turboText.style.color = "#00ff66";
                    wallKickCount = 0; hasJumpActioned = false; soundBoost(); 
                } else if (hasJumpActioned) {
                    turboTimer = pendingChargeTurbo; speed = Math.max(speed, pendingChargeSpeed);
                    turboText.innerText = pendingChargeMsg; turboText.style.color = pendingChargeColor;
                    soundBoost();
                    hasJumpActioned = false;
                }
            } 
        } 
        else { carY = THREE.MathUtils.lerp(carY, targetBaseY, 0.2); }
    }
    
    if (itemBulletTimer <= 0) {
        carGroup.position.y = carY;
    }

    if (keys[" "] && carY <= 0.15 && isSquishedTimer <= 0 && itemBulletTimer <= 0 && !isWallRiding && poleSpinTimer <= 0) {
        jumpChargeTime = Math.min(jumpChargeTime + 1, 60);
    }

    // スピード制御
    if (raceState === 1 || isSquishedTimer > 0) { speed = 0; } 
    else if (poleSpinTimer > 0) { speed = Math.max(speed, 1.8); }
    else if (itemBulletTimer > 0) { }
    else if (isWallRiding) { }
    else if (itemMushroomTimer > 0) { itemMushroomTimer--; speed = 3.0; } 
    else if (itemGoldenTimer > 0) { speed = 3.0; } 
    else if (itemStarTimer > 0) { speed = 2.8; } 
    else if (itemBooTimer > 0) { speed = 2.5; }
    else if (turboTimer > 0) { turboTimer--; speed = Math.max(speed, 2.3); }
    else if (turboTimer < 0) { turboTimer++; speed = 0; } 
    else {
        if (keys.w) speed = Math.min(speed + accel, maxSpeed);
        else if (keys.s) speed = Math.max(speed - accel, -maxSpeed / 2);
        else speed = speed > 0 ? Math.max(speed - decel, 0) : Math.min(speed + decel, 0);
    }

    let turnAngle = 0; let canDrift = (carY <= targetBaseY + 0.1 && !isWaterOn && !isWallRiding && poleSpinTimer <= 0 && itemBulletTimer <= 0);
    if (keys.v && !isDrifting && Math.abs(speed) > 0.4 && !keys.s && isSquishedTimer <= 0 && canDrift) { if (keys.d) { isDrifting = true; driftDir = 1; } else if (keys.a) { isDrifting = true; driftDir = -1; } }
    if (!keys.v && isDrifting) {
        isDrifting = false;
        if (turboState === 1) { turboTimer = 15; soundBoost(); turboText.innerText = "⚡ ミニターボ！ ⚡"; turboText.style.color = "#00ffff"; }
        else if (turboState === 2) { turboTimer = 40; soundBoost(); turboText.innerText = "🔥 ウルトラミニターボ！！ 🔥"; turboText.style.color = "#ff00ff"; }
        turboState = 0; driftCharge = 0;
    }

    if (isWallRiding) { turnAngle = 0; } 
    else if (isDrifting && carY <= targetBaseY + 0.1 && poleSpinTimer <= 0) {
        let driftSteer = driftDir === 1 ? (keys.d ? 1.5 : (keys.a ? 0.3 : 0.8)) : (keys.a ? 1.5 : (keys.d ? 0.3 : 0.8));
        turnAngle = -0.024 * driftDir * driftSteer; driftCharge += driftSteer * 2.5;
        if (driftCharge > 100) { turboState = 2; } else if (driftCharge > 40) { turboState = 1; } else { turboState = 0; }
    } else if (poleSpinTimer <= 0 && itemBulletTimer <= 0) { 
        if (Math.abs(speed) > 0.01 && raceState !== 1) { let sens = isWallRiding ? 0.012 : 0.034; if (keys.a) turnAngle = sens * (speed > 0 ? 1 : -1); if (keys.d) turnAngle = -sens * (speed > 0 ? 1 : -1); } 
    }
    
    if (raceState !== 1) {
        let forwardVector = new THREE.Vector3(-Math.sin(carGroup.rotation.y), 0, -Math.cos(carGroup.rotation.y)).normalize();
        if (itemBulletTimer > 0) {
            bulletProgress += 0.0038; 
            if (bulletProgress >= 1) { bulletProgress -= 1; playerLap++; if (playerLap > 20) { isFinished = true; raceState = 3; } }
            
            let p = bulletProgress;
            let segment = Math.floor(p * NODE_COUNT); let segmentPercent = (p * NODE_COUNT) % 1;
            let startNode = npcPathNodes[segment % NODE_COUNT]; let endNode = npcPathNodes[(segment + 1) % NODE_COUNT];
            
            let targetX = startNode.x + (endNode.x - startNode.x) * segmentPercent;
            let targetZ = startNode.z + (endNode.z - startNode.z) * segmentPercent;
            
            carGroup.position.set(targetX, 0.4, targetZ);
            
            let angle = Math.atan2(endNode.x - startNode.x, endNode.z - startNode.z);
            carGroup.rotation.y = angle;
            
            carGroup.scale.set(1.8, 1.8, 2.5); 

            npcs.forEach(npc => {
                if (carGroup.position.distanceTo(npc.mesh.position) < 14.0 && npc.isSquished <= 0) {
                    npc.isSquished = 150;
                    npc.boostTimer = 0;
                    soundHit();
                    turboText.innerText = "🚀💥 キラーアタック！！ライバルをまとめて吹き飛ばした！ 💥🚀";
                    turboText.style.color = "#ff1111";
                }
            });

            if (itemBulletTimer === 0) {
                carGroup.scale.set(1, 1, 1);
                carModel.material.color.setHex(0xffd700);
                carGroup.rotation.y = angle; 
                turboTimer = 50; 
                speed = 2.4; 
            }
        } else {
            if (poleSpinTimer <= 0) { carGroup.rotation.y += turnAngle; }
            forwardVector = new THREE.Vector3(-Math.sin(carGroup.rotation.y), 0, -Math.cos(carGroup.rotation.y)).normalize();
            carGroup.position.addScaledVector(forwardVector, speed);
        }
        
        if (raceState === 2) {
            if (carPos.z < -300 && carPos.x > -100) midCheckpointPassed = true; 
            if (midCheckpointPassed && Math.abs(carPos.x) < 40 && carPos.z > 40 && carPos.z < 62 && forwardVector.z < 0) {
                midCheckpointPassed = false; 
                if (!isFinished) { 
                    playerLap++; 
                    coinsArray.forEach(c => { c.mesh.visible = true; c.collected = false; });
                    if (playerLap > 20) { isFinished = true; raceState = 3; } 
                }
            }
            lapText.innerText = isFinished ? "Lap: FINISHED" : `Lap: ${playerLap}/20`;
            
            let myRank = getPlayerRank();
            rankText.innerText = `順位: ${myRank}位 / 12`;
        }
    }

    // NPC更新
    npcs.forEach((npc, index) => {
        if (raceState === 2) { 
            let nSpeed = baseMaxSpeed / totalTrackLength;
            
            let playerProgressVal = playerLap + playerProgress;
            let npcProgressVal = npc.lap + npc.progress;
            let diff = playerProgressVal - npcProgressVal;
            let diffFactor = 1.0 + Math.max(-0.3, Math.min(0.3, diff * 0.5));
            nSpeed *= diffFactor;
            
            if (npc.isSquished > 0) { 
                npc.isSquished--; 
                nSpeed = 0.00015; 
                npc.mesh.scale.set(1.5, 0.1, 1.5); 
            } else { 
                npc.mesh.scale.set(1, 1, 1); 
                if (npc.boostTimer > 0) { 
                    npc.boostTimer--; 
                    nSpeed = (baseMaxSpeed * 1.25) / totalTrackLength; 
                } 
            }
            
            updateNpcState(npc);
            nSpeed = updateNpcMovement(npc, nSpeed);
            updateNpcItemStrategy(npc);
            
            if (npc.isStar > 0) {
                npc.isStar--;
                if (npc.mesh.position.distanceTo(carGroup.position) < 7.0 && 
                    itemStarTimer <= 0 && itemMegaTimer <= 0 && itemBooTimer <= 0 && 
                    isSquishedTimer <= 0 && playerHitInvincibleTimer <= 0) {
                    isSquishedTimer = 60; speed = 0; turboTimer = 0; 
                    isDrifting = false; driftCharge = 0; turboState = 0; 
                    itemMushroomTimer = 0; itemGoldenTimer = 0;
                    playerHitInvincibleTimer = 180; 
                    soundHit(); 
                    dropCoins();
                    turboText.innerText = "💥 スター状態のライバルにハネ飛ばされた！！コインを失った！ 💥";
                    turboText.style.color = "#ff3333";
                }
            }
            
            npc.progress += nSpeed; 
            if (npc.progress >= 1) { npc.progress -= 1; npc.lap++; }
            
            if (npc.heldItem) { 
                npc.itemUseTimer--; 
                if (npc.itemUseTimer <= 0) { 
                    useNpcItem(npc); 
                } 
            }
        }
        
        let p = Math.max(0, npc.progress);
        let segment = Math.floor(p * NODE_COUNT); 
        let segmentPercent = (p * NODE_COUNT) % 1;
        let startNode = npcPathNodes[segment % NODE_COUNT]; 
        let endNode = npcPathNodes[(segment + 1) % NODE_COUNT];
        
        let baseX = startNode.x + (endNode.x - startNode.x) * segmentPercent;
        let baseZ = startNode.z + (endNode.z - startNode.z) * segmentPercent;
        
        let offsetX = 0;
        let offsetZ = 0;
        if (Math.abs(npc.targetOffset) > 0.1) {
            const angle = Math.atan2(endNode.x - startNode.x, endNode.z - startNode.z);
            offsetX = -Math.cos(angle) * npc.targetOffset;
            offsetZ = Math.sin(angle) * npc.targetOffset;
        }
        
        const laneOffset = ((index % 2 === 0) ? 5 : -5);
        
        npc.mesh.position.set(
            baseX + offsetX + ((index % 2 === 0) ? 5 : -5),
            0,
            baseZ + offsetZ + ((index % 2 === 0) ? 5 : -5)
        );
        
        if(npc.isMega > 0) { 
            npc.isMega--; 
            npc.mesh.scale.set(2.3, 2.3, 2.3); 
        }
        if(npc.isStar > 0) {
            npc.mesh.scale.set(1.5, 1.5, 1.5);
        }
        
        npc.mesh.lookAt(endNode.x, 0, endNode.z);
        
        if (npc.boostTimer > 0 || npc.state === NPC_STATE.SLIPSTREAM || npc.state === NPC_STATE.BOOSTING) {
            npc.sparkLeft.visible = true;
            npc.sparkRight.visible = true;
            npc.sparkLeft.material.color.setHex(0x00ffff);
            npc.sparkRight.material.color.setHex(0x00ffff);
        } else {
            npc.sparkLeft.visible = false;
            npc.sparkRight.visible = false;
        }
    });
    
    if (raceState === 2) {
        let statusTextLines = "NPCステータス:\n";
        npcs.slice(0, 5).forEach((npc, i) => {
            const stateStr = npc.state === NPC_STATE.NORMAL ? '通常' :
                            npc.state === NPC_STATE.AVOIDING ? '回避' :
                            npc.state === NPC_STATE.SLIPSTREAM ? 'スリップ' :
                            npc.state === NPC_STATE.OVERTAKING ? '追い抜き' :
                            npc.state === NPC_STATE.BLOCKING ? 'ブロック' :
                            npc.state === NPC_STATE.BOOSTING ? 'ブースト' : '???';
            const rank = getNpcRank(npc);
            statusTextLines += `#${i+1} ${stateStr} 順位${rank}位\n`;
        });
        npcStatusEl.innerText = statusTextLines;
    }

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => { 
    camera.aspect = window.innerWidth / window.innerHeight; 
    camera.updateProjectionMatrix(); 
    renderer.setSize(window.innerWidth, window.innerHeight); 
});

animate();
</script>
</body>
</html>
